<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Little Orphan Annie Secret Decoder</title>
<style>
  :root{
    --gold:#d7aa45;
    --gold-dark:#9b7323;
    --paper:#f3e7c4;
    --ink:#24170c;
    --bg1:#4a3218;
    --bg2:#1b1209;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    padding:24px;
    font-family:Georgia, serif;
    color:var(--paper);
    background:radial-gradient(circle at top, var(--bg1), var(--bg2) 70%);
  }

  .app{
    max-width:980px;
    margin:0 auto;
    background:rgba(0,0,0,.35);
    border:2px solid var(--gold-dark);
    border-radius:16px;
    padding:24px;
    box-shadow:0 14px 40px rgba(0,0,0,.35);
  }

  h1{
    margin:0 0 8px;
    text-align:center;
    color:#ffd76a;
  }

  .sub{
    text-align:center;
    color:#d8bf80;
    margin-bottom:22px;
    font-style:italic;
  }

  .layout{
    display:grid;
    grid-template-columns:1.1fr .9fr;
    gap:24px;
  }

  @media (max-width:820px){
    .layout{grid-template-columns:1fr}
  }

  label{
    display:block;
    margin:12px 0 6px;
    color:#ffd76a;
    font-weight:bold;
  }

  select,input,textarea,button{
    width:100%;
    font-size:16px;
    color:var(--paper);
    background:var(--ink);
    border:1px solid var(--gold-dark);
    border-radius:8px;
    padding:10px 12px;
  }

  textarea{
    min-height:120px;
    resize:vertical;
    font-family:"Courier New", monospace;
  }

  .mode-row{
    display:flex;
    gap:10px;
    margin-bottom:8px;
  }

  .mode-btn{
    flex:1;
    cursor:pointer;
    background:linear-gradient(var(--gold), var(--gold-dark));
    color:#fff;
    font-weight:bold;
    letter-spacing:.6px;
  }

  .mode-btn.active{
    background:linear-gradient(#a32626, #681515);
  }

  .process-btn{
    margin-top:8px;
    cursor:pointer;
    background:linear-gradient(var(--gold), var(--gold-dark));
    color:#fff;
    font-weight:bold;
  }

  .output{
    min-height:72px;
    background:#120b06;
    border:2px dashed var(--gold-dark);
    border-radius:10px;
    padding:14px;
    font-family:"Courier New", monospace;
    font-size:18px;
    line-height:1.5;
    color:#ffe08a;
    white-space:pre-wrap;
    word-break:break-word;
  }

  .badge-panel{
    text-align:center;
  }

  .badge-panel img{
    width:100%;
    max-width:360px;
    max-height:320px;
    object-fit:contain;
    background:rgba(255,255,255,.03);
    border:3px solid var(--gold-dark);
    border-radius:12px;
    padding:8px;
  }

  .meta,.perm,.mapping-preview{
    margin-top:12px;
    font-size:14px;
    color:#d8bf80;
  }

  .perm,.mapping-preview{
    font-family:"Courier New", monospace;
    word-break:break-word;
  }

  .hint{
    margin-top:8px;
    font-size:13px;
    color:#d4b267;
    font-style:italic;
  }

  .shift-box{
    padding:12px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(215,170,69,.28);
    border-radius:10px;
    margin-bottom:10px;
  }

  .pair-row{
    display:grid;
    grid-template-columns:1fr 36px 1fr;
    gap:8px;
    align-items:center;
  }

  .eq{
    text-align:center;
    color:#ffd76a;
    font-weight:bold;
    font-size:20px;
  }

  .inline-note{
    margin-top:8px;
    font-size:13px;
    color:#cfad63;
  }

  .small{
    font-size:13px;
    color:#d9c28b;
  }
</style>
</head>
<body>
<div class="app">
  <h1>Little Orphan Annie Secret Decoder</h1>
  <div class="sub">Choose a badge year, set the shift the way that badge actually worked, then encode or decode a message.</div>

  <div class="layout">
    <div>
      <label for="year">Decoder Year</label>
      <select id="year"></select>

      <label>Mode</label>
      <div class="mode-row">
        <button id="encodeBtn" class="mode-btn active" type="button">ENCODE</button>
        <button id="decodeBtn" class="mode-btn" type="button">DECODE</button>
      </div>

      <label>Shift Setting</label>
      <div id="shiftUI" class="shift-box"></div>

      <label id="inputLabel" for="inputText">Plaintext Message</label>
      <textarea id="inputText" placeholder="Type your secret message here..."></textarea>

      <button id="processBtn" class="process-btn" type="button">Process Message</button>

      <label>Result</label>
      <div id="output" class="output">—</div>
    </div>

    <div class="badge-panel">
      <img id="badgeImg" alt="Decoder badge" />
      <div id="badgeInfo" class="meta"></div>
      <div id="permDisplay" class="perm"></div>
      <div id="yearNote" class="hint"></div>
      <div id="mappingPreview" class="mapping-preview"></div>
      <div id="thanksSection" class="thanks-section">Images and cipher permutations thanks to <a href="https://www.mattblaze.org/blog/badges/">Matt Blaze's great post</a></div>
    </div>
  </div>
</div>

<script>
const DECODERS = {
  1935: {
    name: "1935 Radio Orphan Annie Pin",
    perm: "AMZNBLYOKCQXJDRWIESVHGTFUP",
    img: "https://www.mattblaze.org/photos/blog/badge-smallest-20211231-DSC00913.jpg",
    shiftType: "pair",
    note: "Historically set by any plaintext-letter / ciphertext-number pair."
  },
  1936: {
    name: "1936 Radio Orphan Annie Pin",
    perm: "AGTPBHMCSQDFZLNEVJYIWUROKX",
    img: "https://www.mattblaze.org/photos/blog/badge-smallest-20211231-DSC00916.jpg",
    shiftType: "pair",
    note: "Historically set by any plaintext-letter / ciphertext-number pair."
  },
  1937: {
    name: "1937 Radio Orphan Annie Pin",
    perm: "AOIPBNMDSQCFXEHLVJYTWURGKX",
    img: "https://www.mattblaze.org/photos/blog/badge-smallest-20211231-DSC00918.jpg",
    shiftType: "pair",
    note: "Historically set by any plaintext-letter / ciphertext-number pair."
  },
  1938: {
    name: "1938 Radio Orphan Annie Pin",
    perm: "ALVYUTXZWJSNQIBMGPFCKRODHE",
    img: "https://www.mattblaze.org/photos/blog/badge-smallest-20211231-DSC00920.jpg",
    shiftType: "position26",
    note: "Historically set by a back pointer at positions 1–26."
  },
  1939: {
    name: "1939 Radio Orphan Annie Pin",
    perm: "ACEBFDGPMNLKQRWVXUYSHJTIZO",
    img: "https://www.mattblaze.org/photos/blog/badge-smallest-20211231-DSC00923.jpg",
    shiftType: "position8",
    note: "Historically set by one of 8 preset shift positions."
  },
  1940: {
    name: "1940 Radio Orphan Annie Pin",
    perm: "ACEBGHFDJILMKWNORPQSUTVYZX",
    img: "https://www.mattblaze.org/photos/blog/badge-smallest-20211231-DSC00925.jpg",
    shiftType: "pair",
    note: "Historically set by any plaintext-letter / ciphertext-number pair."
  }
};

const SHIFT_1938_AT_ONE = [
  "Y","V","L","A","E","H","D","O","R","K","C","F","P","G",
  "M","B","I","Q","N","S","J","W","Z","X","T","U"
];

const SHIFT_1939_PRESETS = {
  1:"I", 2:"H", 3:"X", 4:"R", 5:"L", 6:"P", 7:"B", 8:"A"
};

const yearEl = document.getElementById("year");
const shiftUIEl = document.getElementById("shiftUI");
const inputTextEl = document.getElementById("inputText");
const outputEl = document.getElementById("output");
const badgeImgEl = document.getElementById("badgeImg");
const badgeInfoEl = document.getElementById("badgeInfo");
const permDisplayEl = document.getElementById("permDisplay");
const yearNoteEl = document.getElementById("yearNote");
const mappingPreviewEl = document.getElementById("mappingPreview");
const inputLabelEl = document.getElementById("inputLabel");
const encodeBtn = document.getElementById("encodeBtn");
const decodeBtn = document.getElementById("decodeBtn");
const processBtn = document.getElementById("processBtn");

let mode = "encode";

Object.keys(DECODERS).forEach(year => {
  const opt = document.createElement("option");
  opt.value = year;
  opt.textContent = year;
  yearEl.appendChild(opt);
});

function getDecoder() {
  return DECODERS[yearEl.value];
}

function clamp(n, min, max) {
  return Math.max(min, Math.min(max, n));
}

function firstLetter(value, fallback = "A") {
  const m = String(value || "").toUpperCase().match(/[A-Z]/);
  return m ? m[0] : fallback;
}

function firstInteger(value, fallback, min, max) {
  const m = String(value ?? "").match(/-?\d+/);
  if (!m) return fallback;
  const n = parseInt(m[0], 10);
  if (isNaN(n)) return fallback;
  return clamp(n, min, max);
}

function computeRotationFromPair(letter, number, perm) {
  const idx = perm.indexOf(letter);
  if (idx < 0) return 0;
  return ((idx - (number - 1)) % 26 + 26) % 26;
}

function getShiftState() {
  const d = getDecoder();
  const perm = d.perm;

  if (d.shiftType === "pair") {
    const letterRaw = document.getElementById("shiftLetter")?.value ?? "";
    const numberRaw = document.getElementById("shiftNumber")?.value ?? "";
    const letter = firstLetter(letterRaw, "A");
    const number = firstInteger(numberRaw, 1, 1, 26);
    const rotation = computeRotationFromPair(letter, number, perm);

    return {
      rotation,
      description: `${letter} = ${number}`,
      equivalentAtOne: decodeNumber(1, perm, rotation)
    };
  }

  if (d.shiftType === "position26") {
    const posRaw = document.getElementById("shiftPos26")?.value ?? "";
    const pos = firstInteger(posRaw, 1, 1, 26);
    const letterAtOne = SHIFT_1938_AT_ONE[pos - 1];
    const rotation = computeRotationFromPair(letterAtOne, 1, perm);

    return {
      rotation,
      description: `Position ${pos} (1 = ${letterAtOne})`,
      equivalentAtOne: letterAtOne
    };
  }

  if (d.shiftType === "position8") {
    const posRaw = document.getElementById("shiftPos8")?.value ?? "";
    const pos = firstInteger(posRaw, 1, 1, 8);
    const letterAtOne = SHIFT_1939_PRESETS[pos];
    const rotation = computeRotationFromPair(letterAtOne, 1, perm);

    return {
      rotation,
      description: `Preset ${pos} (1 = ${letterAtOne})`,
      equivalentAtOne: letterAtOne
    };
  }

  return {
    rotation: 0,
    description: "Default",
    equivalentAtOne: perm[0]
  };
}

function encodeChar(ch, perm, rotation) {
  const idx = perm.indexOf(ch.toUpperCase());
  if (idx === -1) return null;
  return ((idx - rotation) % 26 + 26) % 26 + 1;
}

function decodeNumber(n, perm, rotation) {
  const idx = ((n - 1 + rotation) % 26 + 26) % 26;
  return perm[idx];
}

function buildShiftUI() {
  const d = getDecoder();

  if (d.shiftType === "pair") {
    shiftUIEl.innerHTML = `
      <div class="small">Set the shift with any plaintext-letter / ciphertext-number pair.</div>
      <div class="pair-row" style="margin-top:8px;">
        <input id="shiftLetter" type="text" inputmode="text" maxlength="3" value="A" placeholder="Letter" />
        <div class="eq">=</div>
        <input id="shiftNumber" type="text" inputmode="numeric" value="1" placeholder="Number 1-26" />
      </div>
      <div class="inline-note">Flexible input: typing “r” and “24” works; extra characters are ignored.</div>
    `;
  } else if (d.shiftType === "position26") {
    shiftUIEl.innerHTML = `
      <div class="small">Set the 1938 back-pointer position from 1 to 26.</div>
      <input id="shiftPos26" type="text" inputmode="numeric" value="1" placeholder="Position 1-26" />
      <div class="inline-note">Flexible input: any typed number is accepted and safely interpreted as 1-26.</div>
    `;
  } else if (d.shiftType === "position8") {
    let options = "";
    for (let i = 1; i <= 8; i++) {
      options += `<option value="${i}">${i} (1 = ${SHIFT_1939_PRESETS[i]})</option>`;
    }
    shiftUIEl.innerHTML = `
      <div class="small">Set one of the 1939 badge’s 8 preset shift positions.</div>
      <select id="shiftPos8">${options}</select>
      <div class="inline-note">Historical presets: 1=I, 2=H, 3=X, 4=R, 5=L, 6=P, 7=B, 8=A.</div>
    `;
  }

  shiftUIEl.querySelectorAll("input, select").forEach(el => {
    el.addEventListener("input", processMessage);
    el.addEventListener("change", processMessage);
  });
}

function updateBadge() {
  const d = getDecoder();
  badgeImgEl.src = d.img;
  badgeImgEl.alt = d.name;
  badgeInfoEl.textContent = d.name;
  permDisplayEl.textContent = "Permutation: " + d.perm;
  yearNoteEl.textContent = d.note;
}

function updateMappingPreview() {
  const d = getDecoder();
  const shift = getShiftState();
  const perm = d.perm;
  const pairs = [];

  for (let n = 1; n <= 10; n++) {
    pairs.push(`${n}=${decodeNumber(n, perm, shift.rotation)}`);
  }

  mappingPreviewEl.textContent =
    `Current shift: ${shift.description} • Equivalent to 1=${shift.equivalentAtOne} • Sample mapping: ${pairs.join("  ")}`;
}

function setMode(nextMode) {
  mode = nextMode;
  encodeBtn.classList.toggle("active", mode === "encode");
  decodeBtn.classList.toggle("active", mode === "decode");

  if (mode === "encode") {
    inputLabelEl.textContent = "Plaintext Message";
    inputTextEl.placeholder = "Type letters and spaces, like: BE SURE TO DRINK OVALTINE";
  } else {
    inputLabelEl.textContent = "Ciphertext Message";
    inputTextEl.placeholder = "Enter numbers like: 20 7 - 8 14 4 7";
  }

  processMessage();
}

function processMessage() {
  const d = getDecoder();
  const perm = d.perm;
  const shift = getShiftState();
  const rotation = shift.rotation;
  const text = inputTextEl.value || "";

  updateMappingPreview();

  if (mode === "encode") {
    const out = [];

    for (const ch of text.toUpperCase()) {
      if (/[A-Z]/.test(ch)) {
        const n = encodeChar(ch, perm, rotation);
        if (n !== null) out.push(String(n));
      } else if (/\s/.test(ch)) {
        out.push("-");
      }
    }

    outputEl.textContent = out.length ? out.join(" ") : "—";
    return;
  }

  let result = "";
  const normalized = text.replace(/[–—]/g, "-");
  const tokens = normalized.match(/\d+|-+/g) || [];

  for (const token of tokens) {
    if (/^-+$/.test(token)) {
      if (result && !result.endsWith(" ")) {
        result += " ";
      }
      continue;
    }

    const n = parseInt(token, 10);
    if (!isNaN(n) && n >= 1 && n <= 26) {
      result += decodeNumber(n, perm, rotation);
    }
  }

  outputEl.textContent = result || "—";
}

yearEl.addEventListener("change", () => {
  buildShiftUI();
  updateBadge();
  processMessage();
});

encodeBtn.addEventListener("click", () => setMode("encode"));
decodeBtn.addEventListener("click", () => setMode("decode"));
processBtn.addEventListener("click", processMessage);
inputTextEl.addEventListener("input", processMessage);

yearEl.value = "1940";
buildShiftUI();
updateBadge();
setMode("encode");
</script>
</body>
</html>
